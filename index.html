<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知識大挑戰 - ALM 測驗</title>
    <style>
        /* --- 1. 全域樣式與全螢幕背景圖 --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            /* 背景圖設定：在此替換背景圖網址 */
            background-image: url('https://images.unsplash.com/photo-1510936111840-65e151ad71bb?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover; /* 覆蓋全螢幕 */
            background-position: center; /* 居中 */
            background-attachment: fixed; /* 背景固定，不隨捲動軸滾動 */
            background-repeat: no-repeat;
        }

        /* --- 2. 測驗容器設定 (已移除白色框框) --- */
        .container {
            background-color: transparent; /* 背景改為透明 */
            box-shadow: none;              /* 移除陰影 */
            width: 90%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        /* --- 3. 為了適應透明背景，加入全域文字白色與黑色發光陰影 --- */
        #quiz-header h1, #progress-text, #question-text, 
        #result-status, #result-title, #result-desc {
            color: #ffffff;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8); /* 加上黑色陰影確保字體清晰 */
        }

        /* --- 4. 題目區塊樣式 --- */
        #quiz-header h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        #progress-text {
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        #question-text {
            font-size: 1.5em;
            margin-bottom: 30px;
            line-height: 1.5;
            font-weight: bold;
        }

        /* --- 5. 選項按鈕樣式 --- */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px; /* 選項之間的間距 */
        }
        .btn-option {
            display: block;
            width: 100%;
            padding: 18px;
            /* 按鈕保留一點點半透明白底，讓使用者知道可以點擊 */
            background-color: rgba(255, 255, 255, 0.85); 
            color: #2c3e50; /* 按鈕內的字維持深色 */
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left; /* 文字靠左，較像考卷 */
            box-sizing: border-box; /* 確保 padding 不會撐破寬度 */
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .btn-option:hover {
            background-color: #ffffff;
            transform: translateY(-2px); /* 懸停時微微浮起 */
        }
        .btn-option:active {
            transform: translateY(1px);
        }

        /* --- 6. 結果區塊樣式 --- */
        #result-section {
            display: none; /* 初始隱藏 */
        }
        #result-status {
            font-size: 1.2em;
            margin-bottom: 5px;
        }
        #score-display {
            font-size: 3.5em;
            font-weight: bold;
            color: #4cd137; /* 亮綠色分數 */
            margin-bottom: 25px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.9);
        }
        /* 結果圖片：放在最上方 */
        #result-img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5); /* 圖片加上較深的陰影融入背景 */
            margin-bottom: 25px;
        }
        /* 結果名字：圖片下方，較大字 */
        #result-title {
            font-size: 2.2em;
            margin: 0 0 15px 0;
        }
        /* 結果說明：名字下方，較小字 */
        #result-desc {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: left; /* 說明文字較多，靠左較易閱讀 */
        }

        .btn-restart {
            display: inline-block;
            padding: 15px 35px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        .btn-restart:hover {
            background-color: #c0392b;
        }

    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-section">
            <div id="quiz-header">
                <h1>知識大挑戰</h1>
                <p id="progress-text"></p> </div>
            
            <p id="question-text">載入問題中...</p>
            
            <div id="options-container" class="options-container">
            </div>
        </div>

        <div id="result-section">
            <p id="result-status">你的挑戰結果</p>
            <div id="score-display"></div> <img id="result-img" src="" alt="結果圖片">
            
            <h1 id="result-title"></h1>
            
            <p id="result-desc"></p>
            
            <button class="btn-restart" onclick="location.reload()">再試一次</button>
        </div>
    </div>

    <script>
        // =========================================
        // --- 設定區：你可以在這裡修改題目與結果 ---
        // =========================================

        // --- 1. 定義題目 (多個) ---
        // answer 屬性請填寫選項的索引值 (0 代表第1個選項, 1 代表第2個, 依此類推)
        const quizData = [
            {
                question: "GitHub Pages 預設會尋找哪個檔名作為首頁？",
                options: ["home.html", "index.html", "main.html", "default.html"],
                answer: 1 
            },
            {
                question: "在 Git 中，要將檔案存檔（提交）的指令是什麼？",
                options: ["git push", "git pull", "git commit", "git add"],
                answer: 2 
            },
            {
                question: "HTML 是什麼的縮寫？",
                options: ["HyperText Markup Language", "HighText Machine Language", "Hyperlink and Text Manager", "Home Tool Markup Language"],
                answer: 0
            },
            {
                question: "在 CSS 中，用來設定背景圖片的屬性是？",
                options: ["color", "image-src", "background-image", "picture"],
                answer: 2
            },
            {
                question: "JavaScript 是一種什麼類型的語言？",
                options: ["程式語言 (Programming Language)", "標記語言 (Markup Language)", "樣式語言 (Style Language)", "資料庫語言 (Database Language)"],
                answer: 0
            }
        ];

        // --- 2. 定義結果 (依據答對題數做選擇) ---
        const resultThresholds = {
            "5": {
                title: "ALM 絕對大師",
                desc: "太強了！你完全掌握了 ALM 與網頁開發的基礎知識。你就是我們要找的人才！",
                img: "https://images.unsplash.com/photo-1535303311164-664fc9ec6532?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" 
            },
            "4": {
                title: "優秀的開發者",
                desc: "非常棒！你對絕大多數的概念都很清晰，離大師只有一步之遙。",
                img: "https://images.unsplash.com/photo-1576824227918-64bb7a3f5502?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" 
            },
            "3": {
                title: "潛力新星",
                desc: "不錯喔！你已經具備了基本的概念，再多加練習就能更上一層樓。",
                img: "https://images.unsplash.com/photo-1576824230191-b3b320d778d9?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" 
            },
            "2": {
                title: "繼續努力",
                desc: "有些概念可能還不太熟悉，別灰心，多看幾次教學一定沒問題！",
                img: "https://images.unsplash.com/photo-1590401825633-5c8310c1f544?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" 
            },
            "1": {
                title: "初學者",
                desc: "剛開始接觸對吧？這是個很好的開始，試著去了解每個選項背後的含意吧。",
                img: "https://images.unsplash.com/photo-1611162617474-5b21e879e113?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" 
            },
            "0": {
                title: "需要再加油",
                desc: "似乎完全沒猜中呢。沒關係，再試一次，或者先回頭看看之前的教學。",
                img: "https://images.unsplash.com/photo-1584824460031-bb69046c8e7e?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" 
            }
        };

        // =========================================
        // --- 邏輯控制區 (非必要請勿修改) ---
        // =========================================

        let currentQuestionIndex = 0; 
        let score = 0; 

        const quizSection = document.getElementById("quiz-section");
        const resultSection = document.getElementById("result-section");
        const progressText = document.getElementById("progress-text");
        const questionText = document.getElementById("question-text");
        const optionsContainer = document.getElementById("options-container");

        function loadQuestion() {
            optionsContainer.innerHTML = "";
            const currentQuiz = quizData[currentQuestionIndex];

            progressText.innerText = `題目： ${currentQuestionIndex + 1} / ${quizData.length}`;
            questionText.innerText = currentQuiz.question;

            currentQuiz.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.className = "btn-option";
                button.innerText = option; 
                button.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex) {
            const currentQuiz = quizData[currentQuestionIndex];

            if (selectedIndex === currentQuiz.answer) {
                score++; 
            }

            currentQuestionIndex++;

            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            quizSection.style.display = "none";
            resultSection.style.display = "block";
            document.getElementById("score-display").innerText = `${score} / ${quizData.length}`;

            const finalResult = resultThresholds[score.toString()];

            if (finalResult) {
                document.getElementById("result-img").src = finalResult.img;
                document.getElementById("result-title").innerText = finalResult.title;
                document.getElementById("result-desc").innerText = finalResult.desc;
            } else {
                document.getElementById("result-title").innerText = "測驗完成！";
                document.getElementById("result-desc").innerText = "恭喜你完成了所有題目，但我們似乎忘了幫你的分數準備結果說明...";
            }
        }

        loadQuestion();

    </script>
</body>
</html>
