<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALM_Test</title>
    <style>
/* --- 1. 全域樣式與梵谷星空流動背景 --- */
        body {
            font-family: 'Noto Serif TC', 'PMingLiU', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0; /* 上下留白，避免內容貼齊邊緣 */
            box-sizing: border-box; /* 確保 padding 不會撐破螢幕 */
            
            /* 【關鍵修改】允許上下滾動，隱藏左右滾動，避免手機版內容被裁切 */
            overflow-x: hidden; 
            overflow-y: auto; 
            
            color: #ffffff;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/9/94/Starry_Night_Over_the_Rhone.jpg/1920px-Starry_Night_Over_the_Rhone.jpg');
            background-repeat: no-repeat;
            background-position: center; /* 確保圖片從中央開始縮放 */
            animation: panBackground 30s ease-in-out infinite alternate;
        }

        /* 讓靜態圖片產生「流動感」的動畫：稍微加大背景以適應手機直向螢幕 */
        @keyframes panBackground {
            0% { 
                background-position: 0% 50%; 
                background-size: cover; 
            }
            100% { 
                background-position: 100% 50%; 
                background-size: 150%; 
            }
        }

        /* --- 2. 黑色毛玻璃遮罩 (確保文字清晰) --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        /* --- 3. 測驗容器設定 --- */
        .container {
            width: 90%;
            max-width: 550px;
            /* 【關鍵修改】用 margin: auto 配合 flexbox，確保內容過長時也能正確置中且不裁切頂部 */
            margin: auto; 
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        /* --- 4. 區塊顯示切換與淡入動畫 --- */
        #start-section, #quiz-section, #result-section {
            display: none;
            animation: fadeIn 0.8s ease;
        }
        #start-section.active, #quiz-section.active, #result-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 5. 文字排版樣式 --- */
        h1 {
            font-size: 2.5em;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            margin-bottom: 15px;
            font-weight: normal;
        }
        h2 {
            font-size: 1.5em;
            line-height: 1.6;
            letter-spacing: 2px;
            font-weight: normal;
        }
        .subtitle {
            font-size: 1.1em;
            color: rgba(255,255,255,0.8);
            margin-bottom: 35px;
            letter-spacing: 2px;
            line-height: 1.8;
            text-align: justify; /* 讓長文案兩側對齊，看起來更整齊 */
        }

        /* --- 6. 封面與結果頁的主按鈕樣式 --- */
        .btn-main {
            background-color: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 15px 40px;
            font-size: 18px;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
            border-radius: 5px;
            font-family: inherit;
        }
        .btn-main:hover {
            background-color: rgba(255,255,255,0.15);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        /* --- 7. 測驗題目的選項按鈕樣式 --- */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }
        .btn-option {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-family: inherit;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            line-height: 1.4;
        }
        .btn-option:hover {
            background-color: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            transform: translateX(5px);
        }

        /* --- 8. 結果區塊特殊樣式 --- */
        #result-img {
            width: 100%;
            max-height: 300px; /* 限制圖片最高高度，避免在手機上佔用太多空間 */
            object-fit: cover; /* 確保圖片縮放比例正確 */
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }


        /* =========================================================
           9. 【關鍵】響應式設計 (RWD) - 專為手機與平板調整
           ========================================================= */
        @media (max-width: 768px) {
            .container {
                width: 95%; /* 手機上讓容器寬一點，爭取更多文字空間 */
                padding: 10px;
            }
            h1 {
                font-size: 1.8em; /* 縮小大標題 */
                letter-spacing: 3px;
            }
            h2 {
                font-size: 1.25em; /* 縮小題目文字 */
            }
            .subtitle {
                font-size: 0.95em; /* 縮小封面引言 */
                margin-bottom: 25px;
            }
            .btn-main {
                padding: 12px 30px;
                font-size: 16px;
            }
            .btn-option {
                padding: 14px 16px;
                font-size: 15px; /* 手機上按鈕文字稍微縮小 */
            }
            #score-display {
                font-size: 1.5em !important;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-section" class="active">
            <h1>航向未知：你的學習航行方式</h1>
            <p class="subtitle">想像自己正徜徉在一片廣闊的海洋中。有時海面平靜，有時浪潮起伏，而你需要決定要往哪個方向前進。面對未知的海域，每個人都有不同的探索方式與選擇。接下來的題目，將帶你看看自己在這片「海洋」中的航行方式。
請依照直覺，選出最符合你的選項。</p>
            <button class="btn-main" onclick="startQuiz()">進入測驗</button>
        </div>

        <div id="quiz-section">
            <p id="progress-text" style="font-size: 0.9em; opacity: 0.6;"></p>
            <h2 id="question-text">載入中...</h2>
            <div id="options-container" class="options-container"></div>
        </div>

        <div id="result-section">
            <p>挑戰結果</p>
            <div id="score-display" style="font-size: 2em; margin: 10px 0;"></div>
            <img id="result-img" src="" alt="結果圖片">
            <h2 id="result-title"></h2>
            <p id="result-desc" style="line-height: 1.6; text-align: left;"></p>
            <button class="btn-main" style="margin-top: 20px;" onclick="location.reload()">重新開始</button>
        </div>
    </div>

    <script>
        // 題目與結果設定
        const quizData = [
            {
                question: "有些航行者已經知道自己的方向與能力，而有些人仍在摸索自己是什麼樣的航行者。趙老師在一次航行觀察中發現，許多學生其實不太了解「資優」的意義，也不太清楚自己的特質與能力。如果趙老師希望幫助學生更了解自己、認識資優的意義並開始探索自我，在這片學習海洋中，他最適合先加強哪一種航行準備？",
                options: ["(A) 個別發展", "(B) 定向輔導", "(C) 充實活動", "(D) 深入研究"],
                answer: 1 
            },
            {
                question: "在這片海洋裡，航行者除了學習基本的航行技巧，也會透過各種不同的體驗來探索世界，例如參與文化活動、進行探索旅程、嘗試服務他人，或展開新的冒險。賴老師為資優班學生規劃了「探索、研究、文化活動、服務、冒險旅行」等多樣化的學習活動，希望學生在航行的過程中拓展視野並接觸不同領域。根據自主學習者模式，這些活動最符合哪一種向度的內涵？",
                options: ["(A) 充實活動", "(B) 專題研討", "(C) 深入研究", "(D) 個人發展"],
                answer: 0 
            },
            {
                question: "在這片海洋裡，航行者需要不同的準備與學習方式，例如了解航海知識、培養能力、參與團體活動，或進行深入探索。為了幫助航行者順利前行，學習旅程也會設計不同類型的活動與課程。在自主學習者模式的航行旅程中，下列哪一種「航行準備」與其對應的學習活動較為正確？",
                options: ["(A) 專題研討向度：提供進入方案機會的團體建置活動", "(B) 深入研究向度：由教師為學生所規劃的區分性課程", "(C) 定向輔導向度：安排歷史博物館參訪並聆聽相關專題講座", "(D) 個別發展向度：與學生討論學習技巧並使用數位學習平臺"],
                answer: 3 
            }
        ];

        const resultThresholds = {
            "3": { title: "🏆 歐皇式", desc: "你就像海洋裡自帶金幣加成的航行者，三題全對對你來說簡直小菜一碟。旁人還在掙扎，你可能已經到達目的地，順手還撿了漂流瓶裡的寶藏。偶爾也要注意，不要完全靠運氣，否則下一片海浪可能就不是五星掉落了，船長也得自己划槳啊。"},
            "2": { title: "🧭 亂指式", desc: "你自信滿滿地拿起指南針，但方向全憑直覺，走錯也笑得很開心：「沒關係，這是探索新航道！」同船的夥伴可能偷偷翻白眼，但這正是你的風格——勇往直前，哪管海圖怎麼畫。"},
            "1": { title: "🌊 溺水式", desc: "你一上船通常不是踩板，而是直接掉下去，遇到挑戰就掙扎撲騰，好像在跟海浪打架。雖然最後總能慢慢浮起來，但旁人看你會心驚膽跳。也許可以先穿上救生衣再出航，畢竟學習海洋不是只靠衝刺就能順利漂過。"},
            "0": { title: "🏝 告別式", desc: "遇到新任務，你的第一反應是划向沙灘，優雅地說：「今天不行，我先跟海說聲再見…」舒適又安全，但偶爾太常告別，可能會錯過真正的學習風景。沙灘雖好，可別忘了，船還得繼續航行。"}
        };

        let currentQuestionIndex = 0;
        let score = 0;

        // [邏輯控制：開始測驗]
        function startQuiz() {
            document.getElementById("start-section").classList.remove("active");
            document.getElementById("quiz-section").classList.add("active");
            loadQuestion();
        }

        function loadQuestion() {
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";
            const currentQuiz = quizData[currentQuestionIndex];

            document.getElementById("progress-text").innerText = `Step ${currentQuestionIndex + 1} / ${quizData.length}`;
            document.getElementById("question-text").innerText = currentQuiz.question;

            currentQuiz.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.className = "btn-option";
                button.innerText = option;
                button.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex) {
            if (selectedIndex === quizData[currentQuestionIndex].answer) {
                score++;
            }
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById("quiz-section").classList.remove("active");
            document.getElementById("result-section").classList.add("active");
            document.getElementById("score-display").innerText = `${score} / ${quizData.length}`;

            const finalResult = resultThresholds[score.toString()] || resultThresholds["0"];
            document.getElementById("result-img").src = finalResult.img;
            document.getElementById("result-title").innerText = finalResult.title;
            document.getElementById("result-desc").innerText = finalResult.desc;
        }
    </script>
</body>
</html>
