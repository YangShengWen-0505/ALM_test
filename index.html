<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALM_Test</title>
    <style>
/* --- 1. 全域樣式與梵谷星空流動背景 --- */
        body {
            font-family: 'Noto Serif TC', 'PMingLiU', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0; /* 上下留白，避免內容貼齊邊緣 */
            box-sizing: border-box; /* 確保 padding 不會撐破螢幕 */
            
            /* 【關鍵修改】允許上下滾動，隱藏左右滾動，避免手機版內容被裁切 */
            overflow-x: hidden; 
            overflow-y: auto; 
            
            color: #ffffff;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/9/94/Starry_Night_Over_the_Rhone.jpg/1920px-Starry_Night_Over_the_Rhone.jpg');
            background-repeat: no-repeat;
            background-position: center; /* 確保圖片從中央開始縮放 */
            animation: panBackground 30s ease-in-out infinite alternate;
        }

        /* 讓靜態圖片產生「流動感」的動畫：稍微加大背景以適應手機直向螢幕 */
        @keyframes panBackground {
            0% { 
                background-position: 0% 50%; 
                background-size: cover; 
            }
            100% { 
                background-position: 100% 50%; 
                background-size: 150%; 
            }
        }

        /* --- 2. 黑色毛玻璃遮罩 (確保文字清晰) --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        /* --- 3. 測驗容器設定 --- */
        .container {
            width: 90%;
            max-width: 550px;
            /* 【關鍵修改】用 margin: auto 配合 flexbox，確保內容過長時也能正確置中且不裁切頂部 */
            margin: auto; 
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        /* --- 4. 區塊顯示切換與淡入動畫 --- */
        #start-section, #quiz-section, #result-section {
            display: none;
            animation: fadeIn 0.8s ease;
        }
        #start-section.active, #quiz-section.active, #result-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 5. 文字排版樣式 --- */
        h1 {
            font-size: 2.5em;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            margin-bottom: 15px;
            font-weight: normal;
        }
        h2 {
            font-size: 1.5em;
            line-height: 1.6;
            letter-spacing: 2px;
            font-weight: normal;
        }
        .subtitle {
            font-size: 1.1em;
            color: rgba(255,255,255,0.8);
            margin-bottom: 35px;
            letter-spacing: 2px;
            line-height: 1.8;
            text-align: justify; /* 讓長文案兩側對齊，看起來更整齊 */
        }

        /* --- 6. 封面與結果頁的主按鈕樣式 --- */
        .btn-main {
            background-color: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 15px 40px;
            font-size: 18px;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
            border-radius: 5px;
            font-family: inherit;
        }
        .btn-main:hover {
            background-color: rgba(255,255,255,0.15);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        /* --- 7. 測驗題目的選項按鈕樣式 --- */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }
        .btn-option {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-family: inherit;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            line-height: 1.4;
        }
        .btn-option:hover {
            background-color: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            transform: translateX(5px);
        }

        /* --- 8. 結果區塊特殊樣式 --- */
        #result-img {
            width: 100%;
            max-height: 300px; /* 限制圖片最高高度，避免在手機上佔用太多空間 */
            object-fit: cover; /* 確保圖片縮放比例正確 */
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }


        /* =========================================================
           9. 【關鍵】響應式設計 (RWD) - 專為手機與平板調整
           ========================================================= */
        @media (max-width: 768px) {
            .container {
                width: 95%; /* 手機上讓容器寬一點，爭取更多文字空間 */
                padding: 10px;
            }
            h1 {
                font-size: 1.8em; /* 縮小大標題 */
                letter-spacing: 3px;
            }
            h2 {
                font-size: 1.25em; /* 縮小題目文字 */
            }
            .subtitle {
                font-size: 0.95em; /* 縮小封面引言 */
                margin-bottom: 25px;
            }
            .btn-main {
                padding: 12px 30px;
                font-size: 16px;
            }
            .btn-option {
                padding: 14px 16px;
                font-size: 15px; /* 手機上按鈕文字稍微縮小 */
            }
            #score-display {
                font-size: 1.5em !important;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-section" class="active">
            <h1>知識大挑戰</h1>
            <p class="subtitle">想像自己正徜徉在一片廣闊的海洋中。有時海面平靜，有時浪潮起伏，而你需要決定要往哪個方向前進。面對未知的海域，每個人都有不同的探索方式與選擇。接下來的題目，將帶你看看自己在這片「海洋」中的航行方式。
請依照直覺，選出最符合你的選項。</p>
            <button class="btn-main" onclick="startQuiz()">進入測驗</button>
        </div>

        <div id="quiz-section">
            <p id="progress-text" style="font-size: 0.9em; opacity: 0.6;"></p>
            <h2 id="question-text">載入中...</h2>
            <div id="options-container" class="options-container"></div>
        </div>

        <div id="result-section">
            <p>挑戰結果</p>
            <div id="score-display" style="font-size: 2em; margin: 10px 0;"></div>
            <img id="result-img" src="" alt="結果圖片">
            <h2 id="result-title"></h2>
            <p id="result-desc" style="line-height: 1.6; text-align: left;"></p>
            <button class="btn-main" style="margin-top: 20px;" onclick="location.reload()">重新開始</button>
        </div>
    </div>

    <script>
        // 題目與結果設定
        const quizData = [
            {
                question: "GitHub Pages 預設會尋找哪個檔名作為首頁？",
                options: ["home.html", "index.html", "main.html", "default.html"],
                answer: 1 
            },
            {
                question: "在 Git 中，要將檔案存檔（提交）的指令是什麼？",
                options: ["git push", "git pull", "git commit", "git add"],
                answer: 2 
            },
            {
                question: "HTML 是什麼的縮寫？",
                options: ["HyperText Markup Language", "HighText Machine Language", "Hyperlink and Text Manager", "Home Tool Markup Language"],
                answer: 0
            }
        ];

        const resultThresholds = {
            "3": { title: "ALM 絕對大師", desc: "你對網頁開發有著深不可測的理解！", img: "https://images.unsplash.com/photo-1518152006812-edab29b069ac?q=80&w=600" },
            "2": { title: "優秀的開發者", desc: "表現優異，距離巔峰只有一線之隔。", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=600" },
            "1": { title: "潛力新星", desc: "你已經踏入了這個領域，繼續探索吧！", img: "https://images.unsplash.com/photo-1525333323552-4585e80798a7?q=80&w=600" },
            "0": { title: "再接再厲", desc: "或許這次只是運氣不好，再試一次？", img: "https://images.unsplash.com/photo-1454117096348-e4abd6c4e58d?q=80&w=600" }
        };

        let currentQuestionIndex = 0;
        let score = 0;

        // [邏輯控制：開始測驗]
        function startQuiz() {
            document.getElementById("start-section").classList.remove("active");
            document.getElementById("quiz-section").classList.add("active");
            loadQuestion();
        }

        function loadQuestion() {
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";
            const currentQuiz = quizData[currentQuestionIndex];

            document.getElementById("progress-text").innerText = `Step ${currentQuestionIndex + 1} / ${quizData.length}`;
            document.getElementById("question-text").innerText = currentQuiz.question;

            currentQuiz.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.className = "btn-option";
                button.innerText = option;
                button.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex) {
            if (selectedIndex === quizData[currentQuestionIndex].answer) {
                score++;
            }
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById("quiz-section").classList.remove("active");
            document.getElementById("result-section").classList.add("active");
            document.getElementById("score-display").innerText = `${score} / ${quizData.length}`;

            const finalResult = resultThresholds[score.toString()] || resultThresholds["0"];
            document.getElementById("result-img").src = finalResult.img;
            document.getElementById("result-title").innerText = finalResult.title;
            document.getElementById("result-desc").innerText = finalResult.desc;
        }
    </script>
</body>
</html>
